version: '3.8'\n\nservices:\n  app:\n    image: node:14\n    working_dir: /usr/src/app\n    volumes:\n      - .:/usr/src/app\n    ports:\n      - '3000:3000'\n    environment:\n      - NODE_ENV=development\n      - POSTGRES_HOST=db\n      - POSTGRES_USER=myuser\n      - POSTGRES_PASSWORD=mypassword\n      - POSTGRES_DB=mydatabase\n  db:\n    image: postgres:13\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n    environment:\n      - POSTGRES_USER=myuser\n      - POSTGRES_PASSWORD=mypassword\n      - POSTGRES_DB=mydatabase\n\nvolumes:\n  pgdata: